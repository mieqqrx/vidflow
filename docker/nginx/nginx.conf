worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        location /control {
            rtmp_control all;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        application live {
            live on;

            deny play all;

            on_publish      http://api:8080/api/streams/on-publish;
            on_publish_done http://api:8080/api/streams/on-publish-done;
            on_record_done  http://api:8080/api/streams/on-record-done;

            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 20s;

            hls_variant _360p BANDWIDTH=800000;

            record all;
            record_path /tmp/recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_unique on;
        }
    }
}