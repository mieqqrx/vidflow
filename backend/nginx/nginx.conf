worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

# HTTP сервер — статус nginx и раздача HLS зрителям
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8080;

        # HLS раздача зрителям
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Статус nginx-rtmp (сколько стримеров, viewers и т.д.)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # Управление стримом (kick, redirect)
        location /control {
            rtmp_control all;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        application live {
            live on;
            
            # Запрещаем смотреть напрямую через RTMP — только через HLS
            deny play all;

            # Webhook — вызывается когда OBS начинает трансляцию
            # API валидирует stream key и активирует стрим в БД
            on_publish http://26.192.139.137:5000/api/streams/on-publish;

            # Webhook — вызывается когда OBS заканчивает трансляцию
            on_publish_done http://26.192.139.137:5000/api/streams/on-publish-done;

            # HLS конвертация
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;        # каждые 2 секунды новый сегмент
            hls_playlist_length 20s; # держим последние 20 секунд в плейлисте

            hls_variant _360p BANDWIDTH=800000;

            record all;
            record_path /tmp/recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_unique on;

            on_record_done http://26.192.139.137:5000/api/streams/on-record-done;
        }
    }
}